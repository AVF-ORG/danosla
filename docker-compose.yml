services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app
    working_dir: /var/www
    env_file:
      - .env.docker
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - danosla_network

  web:
    image: nginx:1.25-alpine
    container_name: laravel_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - danosla_network

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: laravel_node
    working_dir: /var/www
    env_file:
      - .env.docker
    volumes:
      - ./:/var/www
      - node_modules:/var/www/node_modules
    ports:
      - "5173:5173"

    networks:
      - danosla_network

  db:
    image: mysql:8.0
    container_name: laravel_db
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - data_base_danosla:/var/lib/mysql
    networks:
      - danosla_network

  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    ports:
      - "6379:6379"
    profiles: ["optional"]
    networks:
      - danosla_network

networks:
  danosla_network:

volumes:
  data_base_danosla:
  node_modules:
