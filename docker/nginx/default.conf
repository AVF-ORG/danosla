server {
    listen 80;
    server_name _;

    root /var/www/public;

    # ── Non-locale Laravel routes ──────────────────────────────────────────
    location ~ ^/(api|sanctum|storage|_ignition|dashboard|empty2) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Locale-prefixed Laravel routes ─────────────────────────────────────
    # Next.js only owns: /{locale}  and  /{locale}/contact
    # Everything else under /{locale}/ belongs to Laravel
    location ~ ^/(en|fr|pl)/(dashboard|profile|login|register|logout|forgot-password|reset-password|transport-firm-bid|calendar|locale|error-403|error-404|error-419|error-429|error-500|error-503|livewire) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Livewire AJAX with hash suffix (e.g. /en/livewire-a560857a/update) ─
    location ~ ^/(en|fr|pl)/livewire- {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Top-level PHP handler ───────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # ── Static assets (Laravel public/, fallback to Next.js) ───────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf)$ {
        try_files $uri @nextjs;
        expires 30d;
        access_log off;
    }

    # ── Everything else → Next.js ───────────────────────────────────────────
    resolver 127.0.0.11 valid=30s;
    location / {
        set $nextjs http://danosla-web:3000;
        proxy_pass $nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location @nextjs {
        set $nextjs http://danosla-web:3000;
        proxy_pass $nextjs;
        proxy_set_header Host $host;
    }
}
