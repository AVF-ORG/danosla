server {
    listen 80;
    server_name _;

    root /var/www/public;

    # Laravel: API, auth, storage, debug
    # try_files internally rewrites to /index.php, caught by the PHP block below
    location ~ ^/(api|sanctum|storage|_ignition)/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Top-level PHP handler (no nesting)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Laravel static assets (fallback to Next.js if not found)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf)$ {
        try_files $uri @nextjs;
        expires 30d;
        access_log off;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://danosla-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location @nextjs {
        proxy_pass http://danosla-web:3000;
        proxy_set_header Host $host;
    }
}
