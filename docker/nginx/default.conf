server {
    listen 80;
    server_name _;

    root /var/www/public;

    # ── Next.js static chunks & image optimization ─────────────────────────
    location ~ ^/_next/ {
        set $nextjs http://danosla-web:3000;
        proxy_pass $nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        access_log off;
    }

    # ── Next.js pages (ONLY these two routes) ──────────────────────────────
    location ~ ^/(en|fr|pl)(/contact)?$ {
        set $nextjs http://danosla-web:3000;
        proxy_pass $nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Root redirect → Next.js (next-intl will redirect to /{locale}) ─────
    location = / {
        set $nextjs http://danosla-web:3000;
        proxy_pass $nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── PHP handler (all Laravel routes) ───────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # ── Everything else → Laravel ───────────────────────────────────────────
    resolver 127.0.0.11 valid=30s;
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
